# Local development: in-memory H2 running in MySQL compatibility mode, so the
# same Flyway migrations and JPA dialect behavior apply as in production.
spring.datasource.url=jdbc:h2:mem:bookshop;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true
