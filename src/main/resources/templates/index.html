<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Counter App</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <main class="card">
        <h1>Simple Counter App</h1>
        <p class="count" th:text="${count}">0</p>
        <div class="actions">
            <form th:action="@{/decrement}" method="post">
                <button type="submit">-</button>
            </form>
            <form th:action="@{/reset}" method="post">
                <button type="submit">Reset</button>
            </form>
            <form th:action="@{/increment}" method="post">
                <button type="submit">+</button>
            </form>
        </div>
    </main>
</body>
</html>
