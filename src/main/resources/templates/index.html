<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookshop</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="page">
        <header class="top-bar">
            <h1>Bookshop</h1>
            <nav>
                <button type="button" id="theme-toggle" class="theme-toggle">Dark mode</button>
            </nav>
        </header>

        <form id="search-form" class="search-bar">
            <input type="text" id="search-input" placeholder="Search by title or author" autocomplete="off">
            <button type="submit">Search</button>
            <button type="button" id="clear-search">Clear</button>
        </form>

        <section class="add-book">
            <h2>Add a book</h2>
            <form id="add-book-form" class="book-form">
                <input type="text" name="title" placeholder="Title" required maxlength="255">
                <input type="text" name="author" placeholder="Author" required maxlength="255">
                <input type="text" name="isbn" placeholder="ISBN" required maxlength="32">
                <input type="number" name="price" placeholder="Price" step="0.01" min="0" required>
                <input type="number" name="stock" placeholder="Stock" step="1" min="0" required>
                <input type="text" name="category" placeholder="Category (optional)" maxlength="100">
                <button type="submit">Add book</button>
            </form>
        </section>

        <section class="catalog">
            <table class="book-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Category</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="books-body"></tbody>
            </table>
            <p id="empty-state" class="empty-state" hidden>No books yet — add one above.</p>
        </section>
    </div>

    <footer class="site-footer">
        <p>
            Built with Spring Boot &amp; vanilla JS &middot;
            <a href="https://github.com/kantinstephane10/simple-app" target="_blank" rel="noopener">Source on GitHub</a>
            &middot;
            <a th:href="@{/actuator/health}">Health</a>
            &middot;
            <a th:href="@{/swagger-ui.html}">API docs</a>
        </p>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script th:src="@{/theme.js}"></script>
    <script th:src="@{/app.js}"></script>
</body>
</html>
