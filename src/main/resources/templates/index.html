<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Counter App</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="page">
        <header class="top-bar">
            <h1>Simple Counter App</h1>
            <nav>
                <button type="button" id="theme-toggle" class="theme-toggle">Dark mode</button>
                <a th:href="@{/about}">About</a>
            </nav>
        </header>

        <form id="add-counter-form" class="add-counter">
            <input type="text" id="new-counter-name" placeholder="New counter name" maxlength="40" autocomplete="off">
            <button type="submit">Add counter</button>
        </form>

        <div class="counters" id="counters"></div>

        <section class="activity">
            <h2>Recent activity</h2>
            <ul class="activity-list" id="activity-list"></ul>
        </section>
    </div>

    <footer class="site-footer">
        <p>
            Built with Spring Boot &amp; vanilla JS &middot;
            <a href="https://github.com/kantinstephane10/simple-app" target="_blank" rel="noopener">Source on GitHub</a>
            &middot;
            <a th:href="@{/actuator/health}">Health</a>
            &middot;
            <a th:href="@{/swagger-ui.html}">API docs</a>
        </p>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <canvas id="confetti"></canvas>

    <script th:src="@{/theme.js}"></script>
    <script th:src="@{/app.js}"></script>
</body>
</html>
