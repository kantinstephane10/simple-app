<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Counter App</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <main class="card">
        <h1>Simple Counter App</h1>
        <p class="count" id="count" th:text="${count}">0</p>
        <div class="actions">
            <button type="button" id="dec" aria-label="Decrement">-</button>
            <button type="button" id="reset">Reset</button>
            <button type="button" id="inc" aria-label="Increment">+</button>
        </div>
    </main>
    <script th:src="@{/app.js}"></script>
</body>
</html>
