version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - mvn -B clean package -DskipTests
      - cp target/simple-app-*.jar target/app.jar
      - chmod +x scripts/*.sh

artifacts:
  files:
    - target/app.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no
